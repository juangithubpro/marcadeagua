<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Watermark Pro SaaS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>

    <div id="pantalla-token" class="modal-token">
        <div class="modal-contenido-gigante">
            <div class="brand-header">
                <h1>Watermark Pro</h1>
                <p>CapsulaWebs • Sistema de Gestión</p>
            </div>
            <div class="login-form-group">
                <input type="text" id="input-token" placeholder="INTRODUCE TU TOKEN" autocomplete="off">
                <button onclick="validarToken()" class="btn-login-gigante">INGRESAR AL SISTEMA</button>
            </div>
            <div id="error-token" class="error-msg"></div>
        </div>
    </div>

    <div class="app-contenedor view-oculta" id="interfaz-principal">
        
        <div class="nav-superior">
            <button class="tab-btn activo" id="btn-tab-controles" onclick="cambiarPagina(0)">⚙️ Configurar</button>
            <button class="tab-btn" id="btn-tab-lienzo" onclick="cambiarPagina(1)">👁️ Ver Placa</button>
        </div>

        <div class="deslizador-paginas" id="deslizador-paginas">
            
            <div class="pagina-app" id="pag-controles">
                <div class="wrapper-controles-full">
                    
                    <div class="info-creditos-card-full">
                        <span>CRÉDITOS DISPONIBLES</span>
                        <h3 id="contador-creditos">0</h3>
                    </div>

                    <div class="control-card-full">
                        <label class="label-remoto-pro">Formato de Salida</label>
                        <div class="grilla-botones" data-target="formato">
                            <button class="btn-remoto-pro activo" data-value="post-vertical">Vertical (4:5)</button>
                            <button class="btn-remoto-pro" data-value="post-cuadrado">Cuadrado (1:1)</button>
                            <button class="btn-remoto-pro" data-value="historia">Historia (9:16)</button>
                        </div>
                    </div>

                    <div class="control-card-full">
                        <label class="label-remoto-pro">Archivos locales</label>
                        <div class="grilla-botones-archivos">
                            <label class="btn-remoto-pro file-label-pro">
                                📸 Cargar Producto
                                <input type="file" id="input-foto" accept="image/*" style="display:none;">
                            </label>
                            <label class="btn-remoto-pro file-label-pro">
                                🏷️ Subir Marca (PNG)
                                <input type="file" id="input-logo" accept="image/*" style="display:none;">
                            </label>
                        </div>
                    </div>

                    <div class="control-card-full">
                        <label class="label-remoto-pro">Posición de Marca</label>
                        <div class="grilla-botones cuadricula-pro" data-target="posicion">
                            <button class="btn-remoto-pro" data-value="arriba-izquierda">↖️ Sup. Izq</button>
                            <button class="btn-remoto-pro" data-value="arriba-derecha">↗️ Sup. Der</button>
                            <button class="btn-remoto-pro" data-value="abajo-izquierda">↙️ Inf. Izq</button>
                            <button class="btn-remoto-pro activo" data-value="abajo-derecha">↘️ Inf. Der</button>
                            <button class="btn-remoto-pro full-width-pro" data-value="centro-gigante">☀️ Marca de Agua Central</button>
                        </div>
                    </div>

                    <div class="control-card-full">
                        <label class="label-remoto-pro">Opacidad del Logo</label>
                        <input type="range" id="range-opacidad" min="0.1" max="1" step="0.05" value="0.85" class="slider-remoto-pro">
                    </div>

                    <div class="control-card-full">
                        <label class="label-remoto-pro">Tamaño del Logo</label>
                        <input type="range" id="range-tamano" min="10" max="80" step="5" value="30" class="slider-remoto-pro">
                    </div>

                    <button class="btn-logout-remoto-pro" onclick="cerrarSesion()">Cerrar Sesión del Comercio</button>
                </div>
            </div>

            <div class="pagina-app" id="pag-lienzo">
                <div class="workspace-placa-full">
                    
                    <div class="lienzo-producto formato-post-vertical" id="lienzo-objetivo">
                        <div class="foto-fondo" id="placa-foto"></div>
                        <img class="logo-marca-agua abajo-derecha" id="placa-logo" src="" style="display: none;">
                    </div>

                    <button type="button" class="action-float-btn-pro" id="btn-descargar" onclick="procesarDescarga()">
                        📥 GUARDAR EN GALERÍA
                    </button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
